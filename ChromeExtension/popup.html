<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 240px;
            padding: 10px;
            font-family: sans-serif;
            background: #fff;
            margin: 0;
        }
        h3 { margin: 0 0 10px 0; text-align: center; color: #c20c0c; }
        button { width: 100%; padding: 8px; margin-bottom: 5px; cursor: pointer; }
        .primary { background: #c20c0c; color: white; border: none; }
        #status { font-size: 12px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <!-- 这里必须写内容 -->
    <h3>网易云控制</h3>

    <button id="next">下一首</button>
    <button id="lyrics">歌词</button>
    <button id="mini">小窗</button>
    <div id="status">就绪</div>

    <script src="popup.js"></script>
</body>
</html>

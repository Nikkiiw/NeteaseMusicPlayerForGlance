<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <title>网易云音乐</title>

    <!-- 引入播放器样式文件 -->
    <link rel="stylesheet" href="netease-mini-player-v2.css">

    <style>
        /* 针对整个网页进行设置 */
        html, body {
            /* 1. 强制隐藏水平和垂直滚动条 */
            overflow: hidden;

            /* 2. 确保背景色生效且铺满全屏 */
            background-color: #151518 !important;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    // --- 加载配置文件并初始化播放器 ---
    Promise.all([
        fetch('playlist_id.txt').then(r => r.text()),
        fetch('api.txt').then(r => r.text()),
        fetch('cookie.txt').then(r => r.text())
    ]).then(([playlistId, apiUrl, cookie]) => {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'netease-mini-player';
        playerDiv.setAttribute('data-playlist-id', 38516269);
        playerDiv.setAttribute('data-api-url', apiUrl.trim());
        playerDiv.setAttribute('data-cookie', `MUSIC_U=${cookie.trim()}`);
        
        playerDiv.setAttribute('data-embed', 'false');
        playerDiv.setAttribute('data-position', 'static');
        playerDiv.setAttribute('data-lyric', 'true');
        playerDiv.setAttribute('data-theme', 'dark');
        playerDiv.setAttribute('data-auto-pause', 'true');
        
        document.body.appendChild(playerDiv);

        const script = document.createElement('script');
        script.src = 'netease-mini-player-v2.js';
        script.onload = function() {
            console.log("✅ 播放器加载完成");
            enableSmartControl();
        };
        document.body.appendChild(script);
    }).catch(err => {
        console.error("❌ 配置文件加载失败:", err);
    });

    // --- 新增代码：智能控制逻辑 ---
    function enableSmartControl() {
        const playerEl = document.querySelector('.netease-mini-player');
        if (!playerEl || !playerEl.neteasePlayer) return;

        const player = playerEl.neteasePlayer;
        let manuallyPaused = false;

        // 拦截用户手动点击播放/暂停按钮
        const originalTogglePlay = player.togglePlay.bind(player);
        player.togglePlay = function() {
            if (player.isPlaying) {
                manuallyPaused = true;
            } else {
                manuallyPaused = false;
            }
            return originalTogglePlay();
        };

        // 拦截所有 play() 调用（切歌、点歌单等），清除手动暂停标记
        const originalPlay = player.play.bind(player);
        player.play = function() {
            manuallyPaused = false;
            return originalPlay();
        };

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'NETEASE_PLAYER_CONTROL') {
                const action = event.data.action;
                console.log("📩 收到指令:", action);

                if (action === 'pause') {
                    player.pause();
                    console.log("⏸️ 已暂停 (避让模式)");
                }
                else if (action === 'play') {
                    if (manuallyPaused) {
                        console.log("🔇 用户手动暂停中，跳过自动恢复");
                        return;
                    }
                    player.play();
                    console.log("▶️ 已恢复播放");
                }
            }
        });
    }
</script>

</body>
</html>
